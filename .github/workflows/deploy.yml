name: Deploy PulseMonitor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/apps/pulsemonitor
          git pull origin main

      - name: Rebuild and restart container
        run: |
          cd ~/apps/pulsemonitor
          docker-compose up --build -d

      - name: Verify container is running
        run: |
          sleep 5
          docker ps | grep pulsemonitor