version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulsemonitor-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped
    networks:
      - pulsemonitor-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulsemonitor-frontend-prod
    ports:
      - "8080:80"
    depends_on:
      - backend

networks:
  pulsemonitor-network:
    driver: bridge